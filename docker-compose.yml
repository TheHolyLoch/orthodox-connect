# Orthodox Connect - Developed by dgm (dgm@tuta.com)
# orthodox-connect/docker-compose.yml

services:
  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      ROOT_DOMAIN: "${ROOT_DOMAIN}"
      PORTAL_DOMAIN: "${PORTAL_DOMAIN}"
      CHAT_DOMAIN: "${CHAT_DOMAIN}"
      MEET_DOMAIN: "${MEET_DOMAIN}"
      LIBRARY_DOMAIN: "${LIBRARY_DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL:-internal@localhost}"
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - reverse_proxy_data:/data
      - reverse_proxy_config:/config
    networks:
      - public
      - internal
      - xmpp
      - video
    ports:
      - "127.0.0.1:${HTTP_PORT:-8081}:80"
    depends_on:
      portal:
        condition: service_healthy
      converse:
        condition: service_started
      jitsi-web:
        condition: service_started
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3

  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      ROOT_DOMAIN: "${ROOT_DOMAIN}"
      PORTAL_DOMAIN: "${PORTAL_DOMAIN}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD_FILE: "/run/secrets/postgres_password"
      POSTGRES_HOST: "${POSTGRES_CONTAINER_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_CONTAINER_PORT:-5432}"
      PORTAL_DATABASE_URL: "${PORTAL_DATABASE_URL:-}"
      PORTAL_ADMIN_HOST: "${PORTAL_ADMIN_HOST:-0.0.0.0}"
      PORTAL_ADMIN_PORT: "${PORTAL_ADMIN_PORT:-8000}"
      PORTAL_INVITE_TOKEN_BYTES: "${PORTAL_INVITE_TOKEN_BYTES:-32}"
      PORTAL_SECRET_KEY_FILE: "/run/secrets/portal_secret_key"
      XMPP_DOMAIN: "${XMPP_DOMAIN}"
      XMPP_MUC_DOMAIN: "${XMPP_MUC_DOMAIN}"
      XMPP_PROVISIONING_TOKEN_FILE: "/run/secrets/xmpp_provisioning_token"
      XMPP_PROVISIONING_URL: "${XMPP_PROVISIONING_URL:-http://prosody:5280/orthodox_provisioning/account}"
      JITSI_JWT_APP_ID: "${JITSI_JWT_APP_ID}"
      JITSI_JWT_APP_SECRET_FILE: "/run/secrets/jitsi_jwt_app_secret"
      JITSI_MEETING_CREATOR_ROLES: "${JITSI_MEETING_CREATOR_ROLES}"
      JITSI_PUBLIC_URL: "${JITSI_PUBLIC_URL}"
      JITSI_TOKEN_TTL_SECONDS: "${JITSI_TOKEN_TTL_SECONDS:-3600}"
      JITSI_XMPP_DOMAIN: "${JITSI_XMPP_DOMAIN}"
    secrets:
      - postgres_password
      - portal_secret_key
      - xmpp_provisioning_token
      - jitsi_jwt_app_secret
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD_FILE: "/run/secrets/postgres_password"
    secrets:
      - postgres_password
    networks:
      - internal
      - host-access
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  prosody:
    image: prosody/prosody:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      XMPP_DOMAIN: "${XMPP_DOMAIN}"
      XMPP_ADMIN_JID: "${XMPP_ADMIN_JID}"
      XMPP_MUC_DOMAIN: "${XMPP_MUC_DOMAIN}"
      XMPP_PROVISIONING_TOKEN_FILE: "/run/secrets/xmpp_provisioning_token"
      XMPP_REGISTRATION_ENABLED: "${XMPP_REGISTRATION_ENABLED:-false}"
    secrets:
      - xmpp_provisioning_token
    networks:
      - internal
      - xmpp
      - public
    ports:
      - "5222:5222"
      - "5269:5269"
    volumes:
      - ./prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - ./prosody/mod_orthodox_provisioning.lua:/usr/lib/prosody/modules/mod_orthodox_provisioning.lua:ro
      - prosody_data:/var/lib/prosody
      - ./prosody/certs:/etc/prosody/certs:ro
    healthcheck:
      test: ["CMD", "prosodyctl", "check", "config"]
      interval: 30s
      timeout: 10s
      retries: 3

  converse:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - /bin/sh
      - -c
      - |
        cp /converse/index.html /usr/share/nginx/html/index.html
        cp /converse/style.css /usr/share/nginx/html/style.css
        envsubst '$$CHAT_DOMAIN $$XMPP_DOMAIN $$XMPP_MUC_DOMAIN $$CONVERSE_BOSH_URL $$CONVERSE_WEBSOCKET_URL' < /converse/config.js.template > /usr/share/nginx/html/config.js
        nginx -g 'daemon off;'
    environment:
      CHAT_DOMAIN: "${CHAT_DOMAIN}"
      XMPP_DOMAIN: "${XMPP_DOMAIN}"
      XMPP_MUC_DOMAIN: "${XMPP_MUC_DOMAIN}"
      CONVERSE_BOSH_URL: "${CONVERSE_BOSH_URL}"
      CONVERSE_WEBSOCKET_URL: "${CONVERSE_WEBSOCKET_URL}"
    networks:
      - internal
      - xmpp
    volumes:
      - ./converse:/converse:ro
    depends_on:
      prosody:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

  jitsi-web:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./jitsi/index.html:/usr/share/nginx/html/index.html:ro
      - ./jitsi/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - video
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  public:
  internal:
    internal: true
  host-access:
  xmpp:
    internal: true
  video:
    internal: true

volumes:
  postgres_data:
  prosody_data:
  reverse_proxy_data:
  reverse_proxy_config:

secrets:
  postgres_password:
    environment: POSTGRES_PASSWORD
  portal_secret_key:
    environment: PORTAL_SECRET_KEY
  jitsi_jwt_app_secret:
    environment: JITSI_JWT_APP_SECRET
  xmpp_provisioning_token:
    environment: XMPP_PROVISIONING_TOKEN
