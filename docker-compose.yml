# Orthodox Connect - Developed by dgm (dgm@tuta.com)
# orthodox-connect/docker-compose.yml

services:
  reverse-proxy:
    image: caddy:2-alpine
    container_name: orthodox_connect_reverse_proxy
    security_opt:
      - no-new-privileges:true
    environment:
      ROOT_DOMAIN: "${ROOT_DOMAIN}"
      PORTAL_DOMAIN: "${PORTAL_DOMAIN}"
      CHAT_DOMAIN: "${CHAT_DOMAIN}"
      MEET_DOMAIN: "${MEET_DOMAIN}"
      LIBRARY_DOMAIN: "${LIBRARY_DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL:-internal@localhost}"
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - reverse_proxy_data:/data
      - reverse_proxy_config:/config
    networks:
      - public
      - internal
      - xmpp
      - video
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"

  portal:
    image: python:3-slim
    container_name: orthodox_connect_portal
    command: ["python3", "-m", "http.server", "8000"]
    security_opt:
      - no-new-privileges:true
    environment:
      ROOT_DOMAIN: "${ROOT_DOMAIN}"
      PORTAL_DOMAIN: "${PORTAL_DOMAIN}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      PORTAL_DATABASE_URL: "${PORTAL_DATABASE_URL}"
      PORTAL_SECRET_KEY: "${PORTAL_SECRET_KEY}"
      JITSI_JWT_APP_ID: "${JITSI_JWT_APP_ID}"
      JITSI_JWT_APP_SECRET: "${JITSI_JWT_APP_SECRET}"
      JITSI_MEETING_CREATOR_ROLES: "${JITSI_MEETING_CREATOR_ROLES}"
      JITSI_PUBLIC_URL: "${JITSI_PUBLIC_URL}"
      JITSI_TOKEN_TTL_SECONDS: "${JITSI_TOKEN_TTL_SECONDS:-3600}"
      JITSI_XMPP_DOMAIN: "${JITSI_XMPP_DOMAIN}"
    networks:
      - internal
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: orthodox_connect_postgres
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./portal/migrations:/docker-entrypoint-initdb.d:ro

  prosody:
    image: prosody/prosody:latest
    container_name: orthodox_connect_prosody
    security_opt:
      - no-new-privileges:true
    environment:
      XMPP_DOMAIN: "${XMPP_DOMAIN}"
      XMPP_ADMIN_JID: "${XMPP_ADMIN_JID}"
      XMPP_MUC_DOMAIN: "${XMPP_MUC_DOMAIN}"
      XMPP_REGISTRATION_ENABLED: "${XMPP_REGISTRATION_ENABLED:-false}"
    networks:
      - internal
      - xmpp
    volumes:
      - ./prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - prosody_data:/var/lib/prosody

  converse:
    image: nginx:alpine
    container_name: orthodox_connect_converse
    security_opt:
      - no-new-privileges:true
    command:
      - /bin/sh
      - -c
      - |
        cp /converse/index.html /usr/share/nginx/html/index.html
        cp /converse/style.css /usr/share/nginx/html/style.css
        envsubst '$$CHAT_DOMAIN $$XMPP_DOMAIN $$XMPP_MUC_DOMAIN $$CONVERSE_BOSH_URL $$CONVERSE_WEBSOCKET_URL' < /converse/config.js.template > /usr/share/nginx/html/config.js
        nginx -g 'daemon off;'
    environment:
      CHAT_DOMAIN: "${CHAT_DOMAIN}"
      XMPP_DOMAIN: "${XMPP_DOMAIN}"
      XMPP_MUC_DOMAIN: "${XMPP_MUC_DOMAIN}"
      CONVERSE_BOSH_URL: "${CONVERSE_BOSH_URL}"
      CONVERSE_WEBSOCKET_URL: "${CONVERSE_WEBSOCKET_URL}"
    networks:
      - internal
      - xmpp
    volumes:
      - ./converse:/converse:ro
    depends_on:
      - prosody

  jitsi-web:
    image: "jitsi/web:${JITSI_IMAGE_VERSION:-stable}"
    container_name: orthodox_connect_jitsi_web
    security_opt:
      - no-new-privileges:true
    environment:
      AUTH_TYPE: "jwt"
      DISABLE_HTTPS: "1"
      ENABLE_AUTH: "${JITSI_ENABLE_AUTH:-1}"
      ENABLE_GUESTS: "${JITSI_ENABLE_GUESTS:-0}"
      ENABLE_WELCOME_PAGE: "0"
      ENABLE_XMPP_WEBSOCKET: "1"
      JWT_ALLOW_EMPTY: "0"
      PUBLIC_URL: "${JITSI_PUBLIC_URL}"
      TZ: "${TZ:-UTC}"
      XMPP_AUTH_DOMAIN: "${JITSI_XMPP_AUTH_DOMAIN}"
      XMPP_BOSH_URL_BASE: "http://jitsi-prosody:5280"
      XMPP_DOMAIN: "${JITSI_XMPP_DOMAIN}"
      XMPP_GUEST_DOMAIN: "${JITSI_XMPP_GUEST_DOMAIN}"
      XMPP_INTERNAL_MUC_DOMAIN: "${JITSI_XMPP_INTERNAL_MUC_DOMAIN}"
      XMPP_MUC_DOMAIN: "${JITSI_XMPP_MUC_DOMAIN}"
      XMPP_SERVER: "jitsi-prosody"
    networks:
      - internal
      - video
    volumes:
      - jitsi_web_config:/config
      - ./jitsi/custom-config.js:/config/custom-config.js:ro
    depends_on:
      - jitsi-jvb

  jitsi-prosody:
    image: "jitsi/prosody:${JITSI_IMAGE_VERSION:-stable}"
    container_name: orthodox_connect_jitsi_prosody
    security_opt:
      - no-new-privileges:true
    environment:
      AUTH_TYPE: "jwt"
      ENABLE_AUTH: "${JITSI_ENABLE_AUTH:-1}"
      ENABLE_GUESTS: "${JITSI_ENABLE_GUESTS:-0}"
      ENABLE_S2S: "0"
      ENABLE_XMPP_WEBSOCKET: "1"
      JICOFO_AUTH_PASSWORD: "${JITSI_JICOFO_AUTH_PASSWORD}"
      JVB_AUTH_PASSWORD: "${JITSI_JVB_AUTH_PASSWORD}"
      JVB_AUTH_USER: "${JITSI_JVB_AUTH_USER:-jvb}"
      JWT_ACCEPTED_AUDIENCES: "${JITSI_JWT_APP_ID}"
      JWT_ACCEPTED_ISSUERS: "${JITSI_JWT_APP_ID}"
      JWT_ALLOW_EMPTY: "0"
      JWT_APP_ID: "${JITSI_JWT_APP_ID}"
      JWT_APP_SECRET: "${JITSI_JWT_APP_SECRET}"
      JWT_AUTH_TYPE: "token"
      JWT_TOKEN_AUTH_MODULE: "token_verification"
      PUBLIC_URL: "${JITSI_PUBLIC_URL}"
      TZ: "${TZ:-UTC}"
      XMPP_AUTH_DOMAIN: "${JITSI_XMPP_AUTH_DOMAIN}"
      XMPP_DOMAIN: "${JITSI_XMPP_DOMAIN}"
      XMPP_GUEST_DOMAIN: "${JITSI_XMPP_GUEST_DOMAIN}"
      XMPP_INTERNAL_MUC_DOMAIN: "${JITSI_XMPP_INTERNAL_MUC_DOMAIN}"
      XMPP_MUC_DOMAIN: "${JITSI_XMPP_MUC_DOMAIN}"
    networks:
      - video
    volumes:
      - jitsi_prosody_config:/config

  jitsi-jicofo:
    image: "jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable}"
    container_name: orthodox_connect_jitsi_jicofo
    security_opt:
      - no-new-privileges:true
    environment:
      AUTH_TYPE: "jwt"
      ENABLE_AUTH: "${JITSI_ENABLE_AUTH:-1}"
      JICOFO_AUTH_PASSWORD: "${JITSI_JICOFO_AUTH_PASSWORD}"
      JICOFO_AUTH_TYPE: "internal"
      JVB_BREWERY_MUC: "${JITSI_JVB_BREWERY_MUC:-jvbbrewery}"
      TZ: "${TZ:-UTC}"
      XMPP_AUTH_DOMAIN: "${JITSI_XMPP_AUTH_DOMAIN}"
      XMPP_DOMAIN: "${JITSI_XMPP_DOMAIN}"
      XMPP_INTERNAL_MUC_DOMAIN: "${JITSI_XMPP_INTERNAL_MUC_DOMAIN}"
      XMPP_MUC_DOMAIN: "${JITSI_XMPP_MUC_DOMAIN}"
      XMPP_SERVER: "jitsi-prosody"
    networks:
      - video
    volumes:
      - jitsi_jicofo_config:/config
    depends_on:
      - jitsi-prosody

  jitsi-jvb:
    image: "jitsi/jvb:${JITSI_IMAGE_VERSION:-stable}"
    container_name: orthodox_connect_jitsi_jvb
    security_opt:
      - no-new-privileges:true
    environment:
      JVB_AUTH_PASSWORD: "${JITSI_JVB_AUTH_PASSWORD}"
      JVB_AUTH_USER: "${JITSI_JVB_AUTH_USER:-jvb}"
      JVB_BREWERY_MUC: "${JITSI_JVB_BREWERY_MUC:-jvbbrewery}"
      JVB_PORT: "${JITSI_JVB_PORT:-10000}"
      JVB_XMPP_AUTH_DOMAIN: "${JITSI_XMPP_AUTH_DOMAIN}"
      JVB_XMPP_INTERNAL_MUC_DOMAIN: "${JITSI_XMPP_INTERNAL_MUC_DOMAIN}"
      JVB_XMPP_PORT: "5222"
      JVB_XMPP_SERVER: "jitsi-prosody"
      PUBLIC_URL: "${JITSI_PUBLIC_URL}"
      TZ: "${TZ:-UTC}"
      XMPP_AUTH_DOMAIN: "${JITSI_XMPP_AUTH_DOMAIN}"
      XMPP_INTERNAL_MUC_DOMAIN: "${JITSI_XMPP_INTERNAL_MUC_DOMAIN}"
      XMPP_PORT: "5222"
      XMPP_SERVER: "jitsi-prosody"
    networks:
      - public
      - video
    ports:
      - "${JITSI_JVB_PORT:-10000}:${JITSI_JVB_PORT:-10000}/udp"
    volumes:
      - jitsi_jvb_config:/config
    depends_on:
      - jitsi-prosody

networks:
  public:
  internal:
    internal: true
  xmpp:
    internal: true
  video:
    internal: true

volumes:
  postgres_data:
  prosody_data:
  jitsi_web_config:
  jitsi_prosody_config:
  jitsi_jicofo_config:
  jitsi_jvb_config:
  reverse_proxy_data:
  reverse_proxy_config:
